title: Thymos
tagline: Unified execution runtime for coding agents.
description: >-
  Thymos is a shared execution runtime for agentic work across CLI, VS Code,
  terminal, and web surfaces. It executes tasks through Intent, Proposal,
  Execution, and Result with real tools, signed authority, and a live
  observable execution session.
url: "https://gryszzz.github.io"
baseurl: "/OpenThymos"
repo: "https://github.com/gryszzz/OpenThymos"
author: "Exponet Labs"

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

permalink: /:basename/

plugins:
  - jekyll-seo-tag

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - launch-playbook.md
  - monster-runtime-roadmap.md

defaults:
  - scope:
      path: ""
    values:
      layout: default
