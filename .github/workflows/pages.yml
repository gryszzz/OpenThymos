name: Validate Site

on:
  push:
    branches: ["main"]
    paths:
      - "README.md"
      - "docs/**"
      - "wiki/**"
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - "next.config.ts"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "site-validation"
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate site and docs
        run: npm run site:check
