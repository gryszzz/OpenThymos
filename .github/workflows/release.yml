name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    name: Build binaries (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: thymos
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: thymos
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p thymos-server -p thymos-cli
      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/thymos-server dist/
          cp target/${{ matrix.target }}/release/thymos        dist/
          cd dist
          tar czf ../../thymos-${{ github.ref_name }}-${{ matrix.target }}.tar.gz thymos-server thymos
      - uses: actions/upload-artifact@v4
        with:
          name: thymos-${{ matrix.target }}
          path: thymos-*.tar.gz

  container:
    name: Build & push container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/thymos-server
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: thymos
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Publish GitHub Release
    needs: [binaries, container]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/thymos-*.tar.gz
          generate_release_notes: true
          body: |
            ## Thymos ${{ github.ref_name }}

            Container image: `ghcr.io/${{ github.repository_owner }}/thymos-server:${{ github.ref_name }}`

            Binaries attached for linux/x86_64, darwin/arm64, darwin/x86_64.
            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for setup.
